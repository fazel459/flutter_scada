name: flutter_scada
description: "Professional SCADA System - Industrial Control & Monitoring"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.3.3
  shared_preferences: ^2.2.2
  mqtt_client: ^10.0.0
  collection: ^1.18.0
  intl: ^0.18.1
  uuid: ^4.3.3
  dio_cookie_manager: ^2.1.0
  cookie_jar: ^3.0.1
  path_provider: ^2.1.1
  provider: ^6.1.1
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2
  fl_chart: ^1.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets: 
    - assests/fonts/

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assests/fonts/Vazirmatn-Light.ttf
          weight: 300
        - asset: assests/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assests/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assests/fonts/Vazirmatn-Bold.ttf
        - weight: 700